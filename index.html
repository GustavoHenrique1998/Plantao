    async function logAction(action, target, details = "") {
      try {
        await db.collection('logs').add({
          action, target, details,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          user: auth.currentUser?.displayName || "Sistema Anônimo"
        });
      } catch (e) { }
    }

    function formatPhone(v) {
      const nums = String(v || "").replace(/\D/g, "").slice(0, 11);
      if (nums.length <= 2) return `(${nums}`;
      if (nums.length <= 6) return `(${nums.slice(0,2)}) ${nums.slice(2)}`;
      if (nums.length <= 10) return `(${nums.slice(0,2)}) ${nums.slice(2,6)}-${nums.slice(6)}`;
      return `(${nums.slice(0,2)}) ${nums.slice(2,7)}-${nums.slice(7)}`;
    }

    function Toast({ message, type = "success", onClose }) {
      useEffect(() => { const id = setTimeout(onClose, 2500); return () => clearTimeout(id); }, [onClose]);
      const isSuccess = type === "success";
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] pointer-events-none page-enter">
          <div className={`flex items-center gap-3 px-4 py-3 rounded-xl text-white text-sm font-semibold shadow-2xl transition-all duration-300 ${isSuccess ? 'bg-slate-900 border border-slate-800' : 'bg-red-600'}`}>
            {isSuccess ? <ICONS.CheckCircle className="w-5 h-5 text-emerald-400" /> : <span>⚠️</span>}
            <span className="tracking-wide">{message}</span>
          </div>
        </div>
      );
    }

    function CardSkeleton() {
      return (
        <div className="bg-white border border-slate-200/60 rounded-2xl p-5 space-y-4 shadow-premium">

          <div className="space-y-2 pt-2"><div className="shimmer h-3 rounded w-full" /><div className="shimmer h-3 rounded w-4/5" /></div>
        </div>
      );
    }

    function Modal({ title, children, onClose }) {
      useEffect(() => {
        const onKey = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", onKey); return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
          <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300" onClick={onClose} />
          <div className="bg-white rounded-3xl shadow-2xl border border-slate-100 w-full max-w-lg relative z-10 page-enter max-h-[95vh] flex flex-col overflow-hidden">
            <div className="flex-shrink-0 flex items-center justify-between px-5 sm:px-6 py-4 border-b border-slate-100 bg-slate-50/50">

            </div>
            <div className="p-5 sm:p-6 overflow-y-auto">{children}</div>
          </div>
        </div>
      );

    function OnCallForm({ defaultValues, submitLabel = "Confirmar", onSubmit }) {
      const [form, setForm] = useState({ personName: "", phone: "", hours: "", observation: "", subgroup: "", isLead: false, hasPhone: true, orderIndex: 99, isOff: false, ...defaultValues });

      return (
        <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); if(form.personName.trim()) onSubmit(form); }}>

          <div><label className="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wider mb-1">Especialidade / Cargo</label><input className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all" value={form.subgroup} onChange={e => setForm(p=>({...p, subgroup: e.target.value}))} /></div>
          <div className="grid grid-cols-2 gap-3"><div onClick={() => handleCheck('hasPhone')} className={`cursor-pointer border-2 rounded-xl p-2.5 flex flex-col items-center justify-center text-center transition-all ${form.hasPhone ? 'border-brand-500 bg-brand-50/50 shadow-sm' : 'border-slate-100 bg-slate-50 hover:bg-slate-100'}`}><ICONS.Phone className={`w-4 h-4 mb-1 ${form.hasPhone ? 'text-brand-500' : 'text-slate-400'}`} /><span className={`text-[11px] font-bold ${form.hasPhone ? 'text-brand-700' : 'text-slate-500'}`}>Possui Telefone</span></div><div onClick={() => handleCheck('isLead')} className={`cursor-pointer border-2 rounded-xl p-2.5 flex flex-col items-center justify-center text-center transition-all ${form.isLead ? 'border-amber-500 bg-amber-50/50 shadow-sm' : 'border-slate-100 bg-slate-50 hover:bg-slate-100'}`}><ICONS.Star className={`w-4 h-4 mb-1 ${form.isLead ? 'text-amber-500' : 'text-slate-400'}`} /><span className={`text-[11px] font-bold ${form.isLead ? 'text-amber-700' : 'text-slate-500'}`}>Líder (Nível 2)</span></div></div>
          <div className={`grid gap-3 ${form.hasPhone ? 'grid-cols-1 sm:grid-cols-2' : 'grid-cols-1'}`}>{form.hasPhone && (<div><label className="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wider mb-1">Contato Telefônico</label><input className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all" value={form.phone} onChange={e => setForm(p=>({...p, phone: formatPhone(String(e.target.value))}))} required={form.hasPhone} /></div>)}<div><label className="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wider mb-1">Janela de Horário</label><input className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all" value={form.hours} onChange={e => setForm(p=>({...p, hours: e.target.value}))} /></div></div>

        </form>
      );
    }
    function SquadForm({ defaultValues = { name: "" }, submitLabel = "Salvar Squad", onSubmit }) {

              ) : (
                <div className="space-y-3">{primaryOnCalls.map((o, idx) => (<div key={o.id} className="flex items-center gap-3 group/row">{admin && <div className="flex flex-col gap-1 opacity-0 group-hover/row:opacity-100 transition-opacity"><button disabled={idx === 0} onClick={() => handleOrderChange(o, 'up')} className="p-1 text-slate-400 hover:text-brand-500 disabled:opacity-20"><ICONS.ArrowUp className="w-3 h-3" /></button><button disabled={idx === primaryOnCalls.length - 1} onClick={() => handleOrderChange(o, 'down')} className="p-1 text-slate-400 hover:text-brand-500 disabled:opacity-20"><ICONS.ArrowDown className="w-3 h-3" /></button></div>}<div className="flex-1"><OnCallCard oncall={o} onEdit={setEditingContact} onDelete={onDelete} setToast={setToast} admin={admin} isLead={false} /></div></div>))}</div>
              )}
            </div>
            <div className="space-y-6">
              <div className="flex items-center justify-between border-b border-slate-100 pb-2"><h3 className="font-display font-bold text-lg text-amber-800">Escalação Nível 2</h3></div>
              {isLoading ? <CardSkeleton /> : escalationLeads.length === 0 ? (
                <div className="text-center py-10 px-4 bg-amber-50/30 rounded-3xl border border-dashed border-amber-200 flex flex-col items-center justify-center"><div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mb-3"><ICONS.Star className="w-5 h-5 text-amber-500" /></div><h3 className="text-sm font-bold text-amber-900 mb-1">Sem Liderança</h3>{admin && <button onClick={() => setShowNewModal(true)} className="mt-2 px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-xl text-xs font-bold">Adicionar Líder</button>}</div>
              ) : <div className="space-y-4">{escalationLeads.map(o => <OnCallCard key={o.id} oncall={o} onEdit={setEditingContact} onDelete={onDelete} setToast={setToast} admin={admin} isLead={true} />)}</div>}
            </div>

          {showNewModal && <Modal title="Novo Integrante" onClose={() => setShowNewModal(false)}><OnCallForm defaultValues={{orderIndex: primaryOnCalls.length + 1}} onSubmit={(v)=>{onAdd(v); setShowNewModal(false);}} /></Modal>}
          {editingContact && <Modal title="Editar Registro" onClose={() => setEditingContact(null)}><OnCallForm defaultValues={editingContact} submitLabel="Atualizar" onSubmit={(v)=>{onEdit(editingContact.id, v); setEditingContact(null);}} /></Modal>}

    // === MÓDULO DE FILIAIS COM CRUD COMPLETO E BUSCA CORRIGIDA ===
    function FiliaisView({ filiais, filialContacts, onBack, onAddFilial, onEditFilial, onDeleteFilial, onAddContact, onEditContact, onDeleteContact, admin, setToast }) {
      const [search, setSearch] = useState("");
      const [isImporting, setIsImporting] = useState(false);
      
      const [selectedFilial, setSelectedFilial] = useState(null);
      const [showFilialModal, setShowFilialModal] = useState(false);
      const [editingFilialData, setEditingFilialData] = useState(null);
      
      const [showContactModal, setShowContactModal] = useState(false);
      const [editingContactData, setEditingContactData] = useState(null);
      
      const fileInputRef = useRef(null);

      // --- FILTRO DE BUSCA CORRIGIDO E BLINDADO AQUI ---
      const results = useMemo(() => {
        if (!search) return [];
        const q = search.toLowerCase().trim();
        const filtered = filiais.filter(f => {
          const paddedNum = padStoreNumber(f.storeNumber);
          const bareNum = String(parseInt(f.storeNumber) || "");
          return paddedNum.includes(q) || bareNum.includes(q) || String(f.name || "").toLowerCase().includes(q) || String(f.regional || "").toLowerCase().includes(q);
        });
        return filtered.sort((a, b) => (parseInt(a.storeNumber) || 0) - (parseInt(b.storeNumber) || 0)).slice(0, 50);
      }, [search, filiais]);

      const handleImportCSV = (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsImporting(true);
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const text = reader.result;
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) throw new Error("CSV Vazio ou sem dados");

            const separator = lines[0].includes(";") ? ";" : ",";
            const parseLine = (line) => {
                let result = []; let inQuotes = false; let current = "";
                for(let i=0; i<line.length; i++) {
                    let char = line[i];
                    if(char === '"') inQuotes = !inQuotes;
                    else if(char === separator && !inQuotes) { result.push(current); current = ""; }
                    else current += char;
                }
                result.push(current);
                return result.map(s => s.trim().replace(/^"|"$/g, ''));
            };

            const headers = parseLine(lines[0]).map(h => h.toLowerCase());
            const idxFilial = headers.findIndex(h => h === 'filial' || h === 'numero');
            const idxNome = headers.findIndex(h => h === 'nome da loja' || h === 'nome');
            const idxRegional = headers.findIndex(h => h === 'regional');
            const idxGerente = headers.findIndex(h => h === 'nome regionais' || h === 'gerente');
            const idxTelefone = headers.findIndex(h => h === 'telefone');
            const idxEndereco = headers.findIndex(h => h.includes('endereço') || h.includes('endereco'));
            const idxNumeroEnd = headers.findIndex(h => h === 'nº' || h === 'numero_end' || h === 'n');
            const idxBairro = headers.findIndex(h => h.includes('bairro'));
            const idxCep = headers.findIndex(h => h.includes('cep'));
            const idxCidade = headers.findIndex(h => h.includes('cidade'));
            const idxEstado = headers.findIndex(h => h.includes('estado'));
            const idxHorario = headers.findIndex(h => h.includes('horário') || h.includes('horario'));
            const idxDomingos = headers.findIndex(h => h.includes('domingos'));

            if (idxFilial === -1) { alert("Não foi possível encontrar a coluna 'Filial' no arquivo."); setIsImporting(false); return; }

            const dataRows = lines.slice(1);
            const records = dataRows.map(row => {
              const cols = parseLine(row);
              if (!cols[idxFilial] || isNaN(parseInt(cols[idxFilial]))) return null; 
              return { 
                storeNumber: cols[idxFilial], name: idxNome !== -1 ? cols[idxNome] : "", regional: idxRegional !== -1 ? cols[idxRegional] : "", 
                managerName: idxGerente !== -1 ? cols[idxGerente] : "", phone: idxTelefone !== -1 ? cols[idxTelefone] : "", address: idxEndereco !== -1 ? cols[idxEndereco] : "",
                addressNumber: idxNumeroEnd !== -1 ? cols[idxNumeroEnd] : "", neighborhood: idxBairro !== -1 ? cols[idxBairro] : "", cep: idxCep !== -1 ? cols[idxCep] : "",
                city: idxCidade !== -1 ? cols[idxCidade] : "", state: idxEstado !== -1 ? cols[idxEstado] : "", hours: idxHorario !== -1 ? cols[idxHorario] : "", openSunday: idxDomingos !== -1 ? cols[idxDomingos] : ""
              };
            }).filter(Boolean);

            const chunks = [];
            for (let i = 0; i < records.length; i += 400) chunks.push(records.slice(i, i + 400));
            
            for (const chunk of chunks) {
              const batch = db.batch();
              chunk.forEach(record => { batch.set(db.collection("filiais").doc(String(record.storeNumber)), record); });
              await batch.commit();
            }
            logAction("Importar Lojas CSV", `${records.length} filiais detalhadas`);
            setToast(`${records.length} filiais sincronizadas!`);
          } catch (err) { console.error(err); alert("Erro ao processar arquivo."); } 
          finally { setIsImporting(false); }
        }; reader.readAsText(file);
      };

      const handleSaveFilial = (data) => {
        if(editingFilialData) { onEditFilial(editingFilialData.storeNumber, data); } 
        else { onAddFilial(data); }
        setEditingFilialData(null); setShowFilialModal(false);
      };

      const handleSaveContact = (data) => {
        if(editingContactData) { onEditContact(editingContactData.id, data); } 
        else { onAddContact(selectedFilial.storeNumber, data); }
        setEditingContactData(null); setShowContactModal(false);
      };

      const activeContactsForSelected = selectedFilial ? filialContacts.filter(c => c.storeNumber === selectedFilial.storeNumber) : [];

      return (
        <div className="space-y-8 page-enter max-w-5xl mx-auto">
          <div className="flex items-center justify-between gap-4 border-b border-slate-200/60 pb-5">
            <div className="flex items-center gap-4">
              <button onClick={onBack} className="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600 shadow-sm"><ICONS.ArrowLeft className="w-4 h-4" /></button>
              <h2 className="font-display font-extrabold text-2xl text-slate-900">Gestão de Filiais</h2>
            </div>
            {admin && (
              <div className="flex gap-2">
                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleImportCSV} />
                <button disabled={isImporting} onClick={() => fileInputRef.current?.click()} className="hidden sm:inline-flex items-center gap-2 px-4 py-2.5 bg-white text-emerald-700 border border-emerald-200 hover:bg-emerald-50 rounded-xl text-xs font-bold transition-all"><ICONS.DocumentText className="w-4 h-4" /> {isImporting ? "Sincronizando..." : "Importar Planilha"}</button>
                <button onClick={() => { setEditingFilialData(null); setShowFilialModal(true); }} className="inline-flex items-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold transition-all shadow-md"><ICONS.Plus className="w-4 h-4" /> Nova Filial</button>
              </div>
            )}
          </div>

          <div className="bg-white p-6 sm:p-10 rounded-[2rem] border border-slate-200/60 shadow-premium">
            <div className="max-w-2xl mx-auto text-center mb-8">
              <div className="w-16 h-16 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center justify-center text-emerald-600 mx-auto mb-5"><ICONS.Building className="w-8 h-8" /></div>
              <h3 className="font-display font-bold text-2xl text-slate-900 mb-2">Qual filial você procura?</h3>
              <p className="text-sm text-slate-500">Digite o número da loja, a cidade ou a regional para buscar ou editar.</p>
            </div>
            <div className="max-w-2xl mx-auto relative mb-10">
              <ICONS.MagnifyingGlass className="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-emerald-500" />
              <input type="search" placeholder="Buscar por número, cidade ou regional..." className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl pl-14 pr-6 py-4 text-lg font-semibold text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-inner" value={search} onChange={e => setSearch(e.target.value)} autoFocus />
            </div>

            {search.length >= 1 && results.length === 0 && <div className="text-center py-8"><p className="text-slate-500 font-medium">Nenhuma filial encontrada para "{search}".</p></div>}
            
            {results.length > 0 && (
              <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                <div className="bg-slate-50 border-b border-slate-200 px-6 py-3 grid grid-cols-12 gap-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-wider"><div className="col-span-2">Número</div><div className="col-span-4">Filial / Cidade</div><div className="col-span-3">Gerência</div><div className="col-span-3 text-right">Ações</div></div>
                <div className="divide-y divide-slate-100 bg-white max-h-[400px] overflow-y-auto">
                  {results.map((f, i) => (
                    <div key={i} className="px-6 py-3 grid grid-cols-12 gap-4 items-center hover:bg-emerald-50/50 transition-colors group">
                      <div className="col-span-2 font-display font-bold text-slate-900">{padStoreNumber(f.storeNumber)}</div>
                      <div className="col-span-4 cursor-pointer" onClick={() => setSelectedFilial(f)}>
                        <p className="text-sm font-bold text-slate-800 group-hover:text-emerald-600 transition-colors">{f.name}</p>
                        {f.regional && <span className="inline-block mt-0.5 text-[10px] font-bold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">{f.regional}</span>}
                      </div>
                      <div className="col-span-3 text-xs font-medium text-slate-600">{f.managerName || "-"}</div>
                      <div className="col-span-3 text-right flex items-center justify-end gap-1.5">
                        <button onClick={() => setSelectedFilial(f)} className="p-2 text-slate-400 hover:text-emerald-600 rounded-lg hover:bg-emerald-100 transition-all"><ICONS.Eye className="w-4 h-4" /></button>
                        {admin && <button onClick={() => { setEditingFilialData(f); setShowFilialModal(true); }} className="p-2 text-slate-400 hover:text-emerald-600 rounded-lg hover:bg-emerald-100 transition-all"><ICONS.Pencil className="w-4 h-4" /></button>}
                        {admin && <button onClick={() => onDeleteFilial(f.storeNumber)} className="p-2 text-slate-400 hover:text-red-500 rounded-lg hover:bg-red-50 transition-all"><ICONS.Trash className="w-4 h-4" /></button>}
                      </div>
                    </div>
                  ))}
                </div>
                {results.length === 50 && <div className="bg-slate-50 border-t border-slate-200 p-3 text-center text-xs font-bold text-slate-500">Exibindo os primeiros 50 resultados. Refine sua busca.</div>}
              </div>
            )}
          </div>

          {/* Modal Edição/Criação de Filial */}
          {showFilialModal && <Modal title={editingFilialData ? "Editar Filial" : "Nova Filial"} onClose={() => {setShowFilialModal(false); setEditingFilialData(null);}}><FilialForm defaultValues={editingFilialData} onSubmit={handleSaveFilial} /></Modal>}

          {/* Modal Raio-X Detalhes Completos */}
          {selectedFilial && !showContactModal && (
            <Modal title={`Filial ${padStoreNumber(selectedFilial.storeNumber)}`} onClose={() => setSelectedFilial(null)}>
              <div className="space-y-6">
                <div>
                  <h2 className="font-display font-bold text-2xl text-slate-900 tracking-tight">{selectedFilial.name}</h2>
                  <div className="flex gap-2 mt-2">
                    {selectedFilial.regional && <span className="inline-block text-[10px] font-bold text-slate-600 bg-slate-100 px-2 py-0.5 rounded border border-slate-200">Reg: {selectedFilial.regional}</span>}
                    {String(selectedFilial.openSunday).toLowerCase() === 'sim' && <span className="inline-block text-[10px] font-bold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded border border-emerald-200">Abre aos Domingos</span>}
                  </div>
                </div>

                <div className="grid grid-cols-1 gap-4">
                  <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <h4 className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><ICONS.MapPin className="w-3.5 h-3.5" /> Endereço Completo</h4>
                    <p className="text-sm font-semibold text-slate-800 leading-relaxed">
                      {selectedFilial.address ? `${selectedFilial.address}, ${selectedFilial.addressNumber || 'S/N'}` : "Endereço não cadastrado."}<br/>
                      {selectedFilial.neighborhood && <span className="text-slate-500 font-medium">Bairro: {selectedFilial.neighborhood}</span>}<br/>

    // --- MAIN APP ---
    function EscalationApp() {
      // States
      const [squads, setSquads] = useState([]); const [oncalls, setOnCalls] = useState([]);
      const [cds, setCds] = useState([]); const [cdContacts, setCdContacts] = useState([]);
      const [filiais, setFiliais] = useState([]); const [filialContacts, setFilialContacts] = useState([]);
      
      const [query, setQuery] = useState("");
      const [view, setView] = useState({ page: "portal", targetId: null });
      const [user, setUser] = useState(null);
      const [toast, setToastMsg] = useState(null);
      
      const [loadingState, setLoadingState] = useState({ squads: true, oncalls: true, cds: true, cdContacts: true, filiais: true, filialContacts: true });
      
      const [showSquadModal, setShowSquadModal] = useState(false); const [editingSquad, setEditingSquad] = useState(null);
      const [showCdModal, setShowCdModal] = useState(false); const [editingCd, setEditingCd] = useState(null);
      const [showImportModal, setShowImportModal] = useState(false);

      const admin = !!user;
      const setToast = (msg, type = "success") => setToastMsg({ msg, type });
      const isLoading = loadingState.squads || loadingState.oncalls || loadingState.cds || loadingState.cdContacts || loadingState.filiais || loadingState.filialContacts;

      useEffect(() => {
        const unsubAuth = auth.onAuthStateChanged(setUser);
        const unsubSquads = db.collection("squads").onSnapshot(snap => { setSquads(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, squads: false })); });
        const unsubOnCalls = db.collection("oncalls").onSnapshot(snap => { setOnCalls(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, oncalls: false })); });
        const unsubCds = db.collection("cds").onSnapshot(snap => { setCds(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, cds: false })); });
        const unsubCdContacts = db.collection("cdContacts").onSnapshot(snap => { setCdContacts(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, cdContacts: false })); });
        const unsubFiliais = db.collection("filiais").onSnapshot(snap => { setFiliais(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, filiais: false })); });
        const unsubFilialContacts = db.collection("filialContacts").onSnapshot(snap => { setFilialContacts(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingState(p => ({ ...p, filialContacts: false })); });
        return () => { unsubAuth(); unsubSquads(); unsubOnCalls(); unsubCds(); unsubCdContacts(); unsubFiliais(); unsubFilialContacts(); };
      }, []);

      // FUNÇÕES SQUADS
      const filteredSquads = useMemo(() => { if(!query.trim()) return squads; return squads.filter(s => String(s.name || "").toLowerCase().includes(String(query).toLowerCase())); }, [query, squads]);
      const activeSquad = useMemo(() => squads.find(s => s.id === view.targetId), [view.targetId, squads]);
      const activeOnCalls = useMemo(() => { return oncalls.filter(o => o.squadId === view.targetId).sort((a,b) => (parseInt(a.orderIndex) || 99) - (parseInt(b.orderIndex) || 99)) }, [view.targetId, oncalls]);

      const handleAddSquad = async (p) => { const ref = await db.collection("squads").add(p); logAction("Criar Squad", p.name); setToast("Squad integrada."); };
      const handleUpdateSquad = async (id, p) => { await db.collection("squads").doc(id).update(p); logAction("Editar Squad", p.name); setToast("Squad atualizada."); };
      const handleDeleteSquad = async (id) => { const tgt = squads.find(s=>s.id===id); if(!confirm(`Excluir a squad "${tgt?.name}"?`)) return; const snap = await db.collection("oncalls").where("squadId", "==", id).get(); const batch = db.batch(); snap.forEach(d => batch.delete(d.ref)); batch.delete(db.collection("squads").doc(id)); await batch.commit(); logAction("Excluir Squad", tgt?.name); setToast("Squad removida."); setView({ page: "home", targetId: null }); };
      const handleAddContact = async (p) => { await db.collection("oncalls").add({ ...p, squadId: view.targetId }); logAction("Adicionar Plantonista", p.personName); setToast("Plantonista adicionado."); };
      const handleUpdateContact = async (id, p) => { await db.collection("oncalls").doc(id).update(p); logAction("Editar Plantonista", p.personName); setToast("Dados atualizados."); };
      const handleDeleteContact = async (id) => { const tgt = oncalls.find(o=>o.id===id); if(!confirm(`Remover ${tgt?.personName}?`)) return; await db.collection("oncalls").doc(id).delete(); logAction("Excluir Plantonista", tgt?.personName); setToast("Removido."); };
      const handleReorderContacts = async (list) => { const batch = db.batch(); list.forEach((item, idx) => { batch.update(db.collection("oncalls").doc(item.id), { orderIndex: idx + 1 }); }); await batch.commit(); setToast("Ordem salva."); };
      const handleRotateQueue = async () => { const activePool = activeOnCalls.filter(o => !o.isLead && !o.isOff); if(activePool.length < 2) return; const [first, ...rest] = activePool; await handleReorderContacts([...rest, first]); logAction("Rotacionar Fila", activeSquad?.name); setToast("Rotação executada."); };

      // FUNÇÕES CDs
      const filteredCds = useMemo(() => { if(!query.trim()) return cds; return cds.filter(c => String(c.name || "").toLowerCase().includes(String(query).toLowerCase())); }, [query, cds]);
      const activeCd = useMemo(() => cds.find(c => c.id === view.targetId), [view.targetId, cds]);
      const activeCdContacts = useMemo(() => { return cdContacts.filter(c => c.cdId === view.targetId).sort((a,b) => (parseInt(a.orderIndex) || 99) - (parseInt(b.orderIndex) || 99)) }, [view.targetId, cdContacts]);

      const handleAddCd = async (p) => { const ref = await db.collection("cds").add(p); logAction("Criar CD", p.name); setToast("CD adicionado."); };
      const handleUpdateCd = async (id, p) => { await db.collection("cds").doc(id).update(p); logAction("Editar CD", p.name); setToast("CD atualizado."); };
      const handleDeleteCd = async (id) => { const tgt = cds.find(c=>c.id===id); if(!confirm(`Excluir o CD "${tgt?.name}" e seus contatos?`)) return; const snap = await db.collection("cdContacts").where("cdId", "==", id).get(); const batch = db.batch(); snap.forEach(d => batch.delete(d.ref)); batch.delete(db.collection("cds").doc(id)); await batch.commit(); logAction("Excluir CD", tgt?.name); setToast("CD removido."); setView({ page: "cd", targetId: null }); };
      const handleAddCdContact = async (p) => { await db.collection("cdContacts").add({ ...p, cdId: view.targetId }); logAction("Adicionar Ramal CD", p.personName); setToast("Contato adicionado."); };
      const handleUpdateCdContact = async (id, p) => { await db.collection("cdContacts").doc(id).update(p); logAction("Editar Ramal CD", p.personName); setToast("Dados atualizados."); };
      const handleDeleteCdContact = async (id) => { const tgt = cdContacts.find(c=>c.id===id); if(!confirm(`Remover ${tgt?.personName}?`)) return; await db.collection("cdContacts").doc(id).delete(); logAction("Excluir Ramal CD", tgt?.personName); setToast("Contato removido."); };

      // FUNÇÕES FILIAIS (CRUD MANUAL)
      const handleAddFilial = async (p) => { await db.collection("filiais").doc(String(p.storeNumber)).set(p); logAction("Criar Filial", `Loja ${p.storeNumber}`); setToast("Filial criada."); };
      const handleUpdateFilial = async (id, p) => { await db.collection("filiais").doc(String(id)).update(p); logAction("Editar Filial", `Loja ${id}`); setToast("Filial atualizada."); };
      const handleDeleteFilial = async (id) => { 
        if(!confirm(`Excluir a loja ${id} e todos os seus ramais?`)) return; 
        const snap = await db.collection("filialContacts").where("storeNumber", "==", id).get(); 
        const batch = db.batch(); snap.forEach(d => batch.delete(d.ref)); 
        batch.delete(db.collection("filiais").doc(String(id))); await batch.commit(); 
        logAction("Excluir Filial", `Loja ${id}`); setToast("Filial removida."); 
      };
      
      const handleAddFilialContact = async (storeNumber, p) => { await db.collection("filialContacts").add({ ...p, storeNumber }); logAction("Adicionar Ramal Loja", p.personName); setToast("Ramal adicionado."); };
      const handleUpdateFilialContact = async (id, p) => { await db.collection("filialContacts").doc(id).update(p); logAction("Editar Ramal Loja", p.personName); setToast("Ramal atualizado."); };
      const handleDeleteFilialContact = async (id) => { const tgt = filialContacts.find(c=>c.id===id); if(!confirm(`Remover o ramal ${tgt?.personName}?`)) return; await db.collection("filialContacts").doc(id).delete(); logAction("Excluir Ramal Loja", tgt?.personName); setToast("Ramal removido."); };

      // BACKUP GLOBAL
      function exportJson() {
        const blob = new Blob([JSON.stringify({ squads, oncalls, cds, cdContacts, filiais, filialContacts }, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `backup-magalu-${new Date().toISOString().slice(0, 10)}.json`; a.click(); URL.revokeObjectURL(url); logAction("Exportar Backup", "Base de Dados Completa");
      }
      function importJson(file) {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const parsed = JSON.parse(reader.result); if (!parsed) { alert("Arquivo JSON inválido."); return; }
            const batch = db.batch();
            if(Array.isArray(parsed.squads)) parsed.squads.forEach(s => batch.set(db.collection("squads").doc(s.id || undefined), { name: String(s.name || "") }));
            if(Array.isArray(parsed.oncalls)) parsed.oncalls.forEach(o => batch.set(db.collection("oncalls").doc(o.id || undefined), { squadId: o.squadId, personName: String(o.personName || ""), phone: String(o.phone || ""), hours: String(o.hours || ""), isLead: !!o.isLead, orderIndex: parseInt(o.orderIndex) || 99, observation: String(o.observation || ""), hasPhone: o.hasPhone !== false, subgroup: String(o.subgroup || ""), isOff: !!o.isOff }));
            if(Array.isArray(parsed.cds)) parsed.cds.forEach(c => batch.set(db.collection("cds").doc(c.id || undefined), { name: String(c.name || "") }));
            if(Array.isArray(parsed.cdContacts)) parsed.cdContacts.forEach(c => batch.set(db.collection("cdContacts").doc(c.id || undefined), { cdId: c.cdId, personName: String(c.personName || ""), phone: String(c.phone || ""), role: String(c.role || ""), orderIndex: parseInt(c.orderIndex) || 99, observation: String(c.observation || "") }));
            if(Array.isArray(parsed.filialContacts)) parsed.filialContacts.forEach(c => batch.set(db.collection("filialContacts").doc(c.id || undefined), { storeNumber: c.storeNumber, personName: String(c.personName || ""), phone: String(c.phone || ""), role: String(c.role || ""), observation: String(c.observation || "") }));
            
            if(Array.isArray(parsed.filiais)) {
               const chunks = [];
               for (let i = 0; i < parsed.filiais.length; i += 400) chunks.push(parsed.filiais.slice(i, i + 400));
               for (const chunk of chunks) {
                 const filiaisBatch = db.batch();
                 chunk.forEach(f => filiaisBatch.set(db.collection("filiais").doc(String(f.storeNumber)), { storeNumber: f.storeNumber, name: f.name, regional: f.regional, managerName: f.managerName, phone: f.phone, address: f.address, neighborhood: f.neighborhood, cep: f.cep, city: f.city, state: f.state, hours: f.hours, openSunday: f.openSunday, addressNumber: f.addressNumber }));
                 await filiaisBatch.commit();
               }
            }
            await batch.commit(); setToast("Backup restaurado com sucesso!"); logAction("Importar Backup JSON", `Arquivo: ${file.name}`);
          } catch (e) { alert("Erro ao ler o arquivo JSON."); }
        }; reader.readAsText(file);
      }

      return (
        <div className="min-h-screen flex flex-col bg-[#fafbfc]">
          <header className="sticky top-0 z-40 glass-nav">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 cursor-pointer select-none group" onClick={() => setView({ page: "portal", targetId: null })}>
                <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center font-display font-black text-white text-sm shadow-md group-hover:shadow-brand-500/50 transition-all">Ω</div>
                <h1 className="font-display font-bold text-slate-900 tracking-tight text-base sm:text-lg hidden min-[400px]:block">Contatos<span className="text-brand-600 font-medium text-xs ml-1 bg-brand-50 border border-brand-100 px-1.5 py-0.5 rounded-md">Magalu</span></h1>
              </div>

              {(view.page === 'home' || view.page === 'cd') && (
                <div className="relative max-w-xs flex-1 hidden sm:block group">
                  <ICONS.MagnifyingGlass className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-brand-500 transition-colors" />
                  <input type="search" placeholder="Filtrar por nome..." className="w-full bg-slate-100/80 border border-slate-200/50 rounded-xl pl-10 pr-4 py-2 text-xs font-medium focus:outline-none focus:border-brand-500 focus:bg-white focus:ring-4 focus:ring-brand-500/10 transition-all" value={query} onChange={e=>setQuery(e.target.value)} />
                </div>
              )}

              <div className="flex items-center gap-2 ml-auto sm:ml-0">
                <button onClick={() => setView({ page: "dashboard" })} className={`px-3 py-2 rounded-xl text-xs font-bold inline-flex items-center gap-1.5 transition-all ${view.page === 'dashboard' ? 'bg-brand-500 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50'}`}><ICONS.Squares className="w-4 h-4" /> NOC</button>
                <button onClick={() => setView({ page: "history" })} className={`px-3 py-2 rounded-xl text-xs font-bold inline-flex items-center gap-1.5 transition-all ${view.page === 'history' ? 'bg-brand-500 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50'}`}><ICONS.Clock className="w-4 h-4" /> Auditoria</button>
                {admin && view.page !== 'portal' && view.page !== 'filiais' && (
                  <>
                    <div className="h-6 w-px bg-slate-200 mx-1 hidden md:block" />
                    <button onClick={exportJson} className="hidden md:inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 transition-all"><ICONS.ArrowDownTray className="w-4 h-4" /> Exportar</button>
                    <button onClick={() => setShowImportModal(true)} className="hidden md:inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 transition-all"><ICONS.ArrowUpTray className="w-4 h-4" /> Importar</button>
                  </>
                )}
                <div className="h-6 w-px bg-slate-200 mx-1" />
                {user ? (
                  <div className="flex items-center gap-2 bg-slate-100 border border-slate-200/60 p-1 rounded-xl shadow-inner">
                    <img src={user.photoURL} alt="" className="w-6 h-6 rounded-lg object-cover ring-1 ring-slate-200" referrerPolicy="no-referrer" />
                    <button onClick={() => auth.signOut()} className="text-[11px] font-bold text-slate-600 hover:text-red-500 px-1.5 transition-colors">Sair</button>
                  </div>
                ) : (
                  <button onClick={() => auth.signInWithPopup(provider)} className="bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs px-4 py-2 rounded-xl transition-all shadow-md">Acesso Restrito</button>
                )}
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            {/* PORTAL GLOBAL */}
            {view.page === "portal" && (
              <div className="space-y-10 page-enter">
                <div className="bg-gradient-to-br from-slate-900 via-slate-950 to-brand-900 rounded-3xl p-6 sm:p-10 text-white relative overflow-hidden shadow-2xl border border-slate-800">
                  <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 80% 20%, rgba(0, 82, 255, 0.4) 0%, transparent 60%)' }} />
                  <div className="relative z-10 max-w-2xl space-y-3">
                    <span className="inline-flex items-center gap-1.5 text-[10px] font-bold tracking-widest uppercase bg-brand-500/20 border border-brand-500/30 text-brand-400 px-2.5 py-1 rounded-lg">Intranet Unificada</span>
                    <h2 className="font-display font-extrabold text-3xl sm:text-5xl tracking-tight leading-none">Contatos Gerais Magalu</h2>
                    <p className="text-slate-400 text-sm sm:text-base leading-relaxed">Portal centralizado de acionamento crítico e comunicação operacional. Escolha o setor abaixo para visualizar as matrizes de contato.</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8">
                  <div onClick={() => setView({ page: "cd" })} className="transition-premium bg-white border border-slate-200/80 rounded-3xl p-6 shadow-premium hover:shadow-premium-hover hover:border-amber-400 cursor-pointer group flex flex-col justify-between min-h-[180px]">
                    <div className="w-12 h-12 bg-amber-50 border border-amber-100 rounded-2xl flex items-center justify-center text-amber-600 group-hover:scale-110 transition-transform"><ICONS.Truck className="w-6 h-6" /></div>
                    <div className="mt-6"><h3 className="font-display font-bold text-xl text-slate-900 group-hover:text-amber-600 transition-colors">Centros de Distribuição (CD)</h3><p className="text-xs text-slate-500 mt-1.5 leading-relaxed">Contatos operacionais, logística, galpões corporativos e fluxos de emergência das regionais de distribuição.</p></div>
                  </div>
                  <div onClick={() => setView({ page: "filiais" })} className="transition-premium bg-white border border-slate-200/80 rounded-3xl p-6 shadow-premium hover:shadow-premium-hover hover:border-emerald-400 cursor-pointer group flex flex-col justify-between min-h-[180px]">
                    <div className="w-12 h-12 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center justify-center text-emerald-600 group-hover:scale-110 transition-transform"><ICONS.Building className="w-6 h-6" /></div>
                    <div className="mt-6"><h3 className="font-display font-bold text-xl text-slate-900 group-hover:text-emerald-600 transition-colors">Lojas & Filiais ({filiais.length})</h3><p className="text-xs text-slate-500 mt-1.5 leading-relaxed">Matriz de contatos de gerências regionais, filiais físicas, links de suporte de rede de lojas e comercial.</p></div>
                  </div>
                  <div onClick={() => setView({ page: "home" })} className="transition-premium bg-white border border-slate-200/80 rounded-3xl p-6 shadow-premium hover:shadow-premium-hover hover:border-brand-500 cursor-pointer group flex flex-col justify-between min-h-[180px]">
                    <div className="w-12 h-12 bg-brand-50 border border-brand-100 rounded-2xl flex items-center justify-center text-brand-500 group-hover:scale-110 transition-transform"><ICONS.Clock className="w-6 h-6" /></div>
                    <div className="mt-6"><h3 className="font-display font-bold text-xl text-slate-900 group-hover:text-brand-600 transition-colors">Escalação & Plantões (NOC)</h3><p className="text-xs text-slate-500 mt-1.5 leading-relaxed">Gerenciamento das matrizes de acionamento das squads técnicas de TI, Engenharia de Software e redes.</p></div>
                  </div>
                </div>
              </div>
            )}

            {/* MÓDULO FILIAIS */}
            {view.page === "filiais" && (
              <FiliaisView 
                filiais={filiais} 
                filialContacts={filialContacts}
                onBack={() => setView({ page: "portal" })} 
                onAddFilial={handleAddFilial}
                onEditFilial={handleUpdateFilial}
                onDeleteFilial={handleDeleteFilial}
                onAddContact={handleAddFilialContact}
                onEditContact={handleUpdateFilialContact}
                onDeleteContact={handleDeleteFilialContact}
                admin={admin} 
                setToast={setToast} 
              />
            )}

            {/* MÓDULO CD */}
            {view.page === "cd" && (
              <div className="space-y-8 page-enter">
                <div className="bg-gradient-to-br from-slate-900 via-slate-900 to-amber-900 rounded-3xl p-6 sm:p-8 text-white relative overflow-hidden shadow-2xl border border-slate-800">
                  <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.4) 0%, transparent 60%)' }} />
                  <div className="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div className="space-y-2.5">
                      <span className="inline-flex items-center gap-1.5 text-[10px] font-bold tracking-widest uppercase bg-amber-500/10 border border-amber-500/20 text-amber-400 px-2.5 py-1 rounded-lg"><span className="w-1.5 h-1.5 rounded-full bg-amber-400 pulse-dot" /> Logística Integrada</span>
                      <h2 className="font-display font-extrabold text-2xl sm:text-4xl tracking-tight">Centros de Distribuição</h2>
                      <p className="text-slate-400 text-xs sm:text-sm max-w-xl leading-relaxed">Matriz de contatos diretos e ramais operacionais dos galpões de distribuição em todo o país.</p>
                      <button onClick={() => setView({ page: "portal" })} className="inline-flex items-center gap-1 text-xs text-amber-400 hover:text-amber-300 font-bold mt-2 transition-colors">← Voltar para Contatos Gerais</button>
                    </div>
                    <div className="flex gap-4 sm:gap-6 bg-white/5 border border-white/10 p-4 rounded-2xl backdrop-blur-md self-start md:self-center shadow-inner">
                      <div className="text-center min-w-[60px]"><p className="font-display font-bold text-xl sm:text-2xl text-white">{cds.length}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Locais</p></div>
                      <div className="w-px bg-white/10" />
                      <div className="text-center min-w-[60px]"><p className="font-display font-bold text-xl sm:text-2xl text-amber-400">{cdContacts.length}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ramais</p></div>
                    </div>
                  </div>
                </div>
                <div className="space-y-5">
                  <div className="flex items-center justify-between border-b border-slate-200/60 pb-3">
                    <h3 className="font-display font-bold text-xl text-slate-900 tracking-tight">Galpões Regionais</h3>
                    {admin && <button onClick={() => setShowCdModal(true)} className="inline-flex items-center gap-1.5 text-xs font-bold bg-slate-900 hover:bg-amber-600 text-white px-4 py-2.5 rounded-xl transition-all shadow-md"><ICONS.Plus className="w-3.5 h-3.5" /> Criar CD</button>}
                  </div>
                  {isLoading ? <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">{Array.from({length:4}).map((_,i)=><CardSkeleton key={i} />)}</div> : filteredCds.length === 0 ? (
                    <div className="text-center py-16 bg-white border border-slate-200 rounded-2xl shadow-sm"><p className="text-sm font-medium text-slate-500">Nenhum Centro de Distribuição localizado.</p></div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filteredCds.sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""))).map(cd => <CdCard key={cd.id} cd={cd} contacts={cdContacts} onClick={() => setView({ page: "cd_detail", targetId: cd.id })} onEdit={setEditingCd} onDelete={handleDeleteCd} admin={admin} />)}
                    </div>
                  )}
                </div>
              </div>
            )}
            {view.page === "cd_detail" && activeCd && <CdDetailView cd={activeCd} contacts={activeCdContacts} onBack={() => setView({ page: "cd", targetId: null })} onAdd={handleAddCdContact} onEdit={handleUpdateCdContact} onDelete={handleDeleteCdContact} setToast={setToast} isLoading={isLoading} admin={admin} />}

            {/* MÓDULO SQUADS/NOC */}
            {view.page === "home" && (
              <div className="space-y-8 page-enter">
                <div className="bg-gradient-to-br from-slate-900 via-slate-950 to-brand-900 rounded-3xl p-6 sm:p-8 text-white relative overflow-hidden shadow-2xl border border-slate-800">
                  <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 80% 20%, rgba(0, 82, 255, 0.4) 0%, transparent 60%)' }} />
                  <div className="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div className="space-y-2.5">
                      <span className="inline-flex items-center gap-1.5 text-[10px] font-bold tracking-widest uppercase bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-2.5 py-1 rounded-lg"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot" /> Matrizes NOC Ativas</span>
                      <h2 className="font-display font-extrabold text-2xl sm:text-4xl tracking-tight">Fila de Escalação de Plantões</h2>
                      <p className="text-slate-400 text-xs sm:text-sm max-w-xl leading-relaxed">Gerenciamento em tempo real de matrizes de acionamento emergencial das squads de engenharia.</p>
                      <button onClick={() => setView({ page: "portal" })} className="inline-flex items-center gap-1 text-xs text-brand-400 hover:text-brand-300 font-bold mt-2 transition-colors">← Voltar para Contatos Gerais</button>
                    </div>
                    <div className="flex gap-4 sm:gap-6 bg-white/5 border border-white/10 p-4 rounded-2xl backdrop-blur-md self-start md:self-center shadow-inner">
                      <div className="text-center min-w-[60px]"><p className="font-display font-bold text-xl sm:text-2xl text-white">{squads.length}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Squads</p></div>
                      <div className="w-px bg-white/10" />
                      <div className="text-center min-w-[60px]"><p className="font-display font-bold text-xl sm:text-2xl text-brand-400">{oncalls.filter(o=>!o.isLead && !o.isOff).length}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Ativos</p></div>
                      <div className="w-px bg-white/10" />
                      <div className="text-center min-w-[60px]"><p className="font-display font-bold text-xl sm:text-2xl text-amber-400">{oncalls.filter(o=>o.isLead).length}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Líderes</p></div>
                    </div>
                  </div>
                </div>
                <div className="space-y-5">
                  <div className="flex items-center justify-between border-b border-slate-200/60 pb-3">
                    <h3 className="font-display font-bold text-xl text-slate-900 tracking-tight">Matrizes de Squads</h3>
                    {admin && <button onClick={() => setShowSquadModal(true)} className="inline-flex items-center gap-1.5 text-xs font-bold bg-slate-900 hover:bg-brand-600 text-white px-4 py-2.5 rounded-xl transition-all shadow-md"><ICONS.Plus className="w-3.5 h-3.5" /> Criar Squad</button>}
                  </div>
                  {isLoading ? <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">{Array.from({length:4}).map((_,i)=><CardSkeleton key={i} />)}</div> : filteredSquads.length === 0 ? (
                    <div className="text-center py-16 bg-white border border-slate-200 rounded-2xl shadow-sm"><p className="text-sm font-medium text-slate-500">Nenhuma squad localizada.</p></div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filteredSquads.sort((a,b)=>String(a.name || "").localeCompare(String(b.name || ""))).map(squad => <SquadCard key={squad.id} squad={squad} oncalls={oncalls} onClick={() => setView({ page: "detail", targetId: squad.id })} onEdit={setEditingSquad} onDelete={handleDeleteSquad} admin={admin} />)}
                    </div>
                  )}
                </div>
              </div>
            )}
            {view.page === "detail" && activeSquad && <DetailView squad={activeSquad} oncalls={activeOnCalls} onBack={() => setView({ page: "home", targetId: null })} onAdd={handleAddContact} onEdit={handleUpdateContact} onDelete={handleDeleteContact} onReorder={handleReorderContacts} onRotate={handleRotateQueue} setToast={setToast} isLoading={isLoading} admin={admin} />}

            {/* VIEWS GERAIS (Dashboard e Histórico) */}
            {view.page === "history" && <HistoryView onBack={() => setView({ page: "portal" })} />}
            {view.page === "dashboard" && <DashboardView squads={squads} oncalls={oncalls} onBack={() => setView({ page: "portal" })} isLoading={isLoading} setToast={setToast} />}

          </main>

          <footer className="border-t border-slate-200/60 bg-white py-6 mt-12">
            <div className="max-w-7xl mx-auto px-4 text-center text-xs font-medium text-slate-400">Contatos Gerais Magalu • Sistema Operacional e Logístico</div>
          </footer>

          {showSquadModal && <Modal title="Criar Nova Squad" onClose={() => setShowSquadModal(false)}><SquadForm onSubmit={(v)=>{handleAddSquad(v); setShowSquadModal(false);}} /></Modal>}
          {editingSquad && <Modal title="Renomear Squad" onClose={() => setEditingSquad(null)}><SquadForm defaultValues={editingSquad} submitLabel="Atualizar Nome" onSubmit={(v)=>{handleUpdateSquad(editingSquad.id, v); setEditingSquad(null);}} /></Modal>}
          {showCdModal && <Modal title="Criar Novo CD" onClose={() => setShowCdModal(false)}><CdForm onSubmit={(v)=>{handleAddCd(v); setShowCdModal(false);}} /></Modal>}
          {editingCd && <Modal title="Renomear CD" onClose={() => setEditingCd(null)}><CdForm defaultValues={editingCd} submitLabel="Atualizar Nome" onSubmit={(v)=>{handleUpdateCd(editingCd.id, v); setEditingCd(null);}} /></Modal>}
          {showImportModal && <ImportModal onClose={() => setShowImportModal(false)} onImport={importJson} />}
          {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToastMsg(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<EscalationApp />);
  </script>

  <script>
    (function () {
      const source = document.getElementById('app-script').textContent;
      const compiled = window.Babel.transform(source, {
        presets: [['react', { runtime: 'classic' }]],
        babelrc: false,
        configFile: false
      }).code;
      new Function(compiled)();
    })();
  </script>
</body>
</html>
