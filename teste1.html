    <script type="text/babel" data-presets="env,react">
      const { useEffect, useMemo, useState } = React;

      // ==========================================
      // Ícones SVG
      // ==========================================
      function Icon({ path, className = "w-5 h-5" }) {
        return (
          <svg
            xmlns="http://www.w3.org/2000/svg"

            viewBox="0 0 24 24"
            strokeWidth={1.5}

          >
            <path strokeLinecap="round" strokeLinejoin="round" d={path} />
          </svg>
        );
      }
      
      const ICONS = {
        Plus: (props) => <Icon path="M12 4.5v15m7.5-7.5h-15" {...props} />,
        ArrowRight: (props) => <Icon path="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" {...props} />,
        Pencil: (props) => <Icon path="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" {...props} />,
        Trash: (props) => <Icon path="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" {...props} />,
        ArrowUturnLeft: (props) => <Icon path="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" {...props} />,
        UserPlus: (props) => <Icon path="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A1.33 1.33 0 0115.3 21H8.7a1.33 1.33 0 01-1.4-1.765z" {...props} />,
        Phone: (props) => <Icon path="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.213-.992-.55-1.33l-2.96-2.96c-.337-.337-.834-.43-1.258-.235l-2.028.761a1.125 1.125 0 01-1.343-.464l-3.21-5.562a1.125 1.125 0 01.192-1.296l1.6-1.6c.337-.337.43-.834.235-1.258l-.76-2.028C8.732 2.463 8.256 2.25 7.74 2.25H6.368c-1.24 0-2.25.986-2.25 2.193v.357z" {...props} />,
        ArrowUpTray: (props) => <Icon path="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" {...props} />,
        ArrowDownTray: (props) => <Icon path="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" {...props} />,
        CheckCircle: (props) => <Icon path="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" {...props} />,
        User: (props) => <Icon path="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A1.875 1.875 0 0118 22.5H6a1.875 1.875 0 01-1.499-2.382z" {...props} />,
        Star: (props) => <Icon path="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.31h5.513c.498 0 .704.657.337.986l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-3.356a.563.563 0 00-.586 0L6.982 21.07a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.337-.986H9.88a.563.563 0 00.475-.31l2.125-5.11z" {...props} />,
        DocumentMagnifyingGlass: (props) => <Icon path="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.23 13.5h-3m-4.5 0H4.5v-2.25M15 12v5.25m0 0H9m6 0a3 3 0 100-6 3 3 0 000 6z" {...props} />,
        InformationCircle: (props) => <Icon path="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" {...props} />,
        Clipboard: (props) => <Icon path="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a2.25 2.25 0 01-2.25 2.25H9A2.25 2.25 0 016.75 4.5v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185v1.063a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 9.75V8.687c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" {...props} />,
      };

      // ==========================================
      // Configuração do Firebase
      // ==========================================
      const firebaseConfig = {
        apiKey: "AIzaSyBF-KrK6o4C9MVIJkujMDqyiLmV_T9lR1c",
        authDomain: "plantaomagalu.firebaseapp.com",
        projectId: "plantaomagalu",
        storageBucket: "plantaomagalu.firebasestorage.app",
        messagingSenderId: "190895198921",
        appId: "1:190895198921:web:efa676cd5dde22151ef318",
        measurementId: "G-31FZD3JNY4"
      };

      // Inicializa o Firebase
      const app = firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      
      // ==========================================
      // Função Helper (Copiar)
      // ==========================================
      function copyToClipboard(textToCopy) {
        try {
          navigator.clipboard.writeText(textToCopy);
          return true; // Sucesso
        } catch (err) {
          console.error('Falha ao copiar: ', err);
          return false; // Falha
        }
      }

      function EscalationApp() {
        // Estados
        const [squads, setSquads] = useState([]);
        const [oncalls, setOnCalls] = useState([]);
        const [data, setData] = useState({ squads: [], oncalls: [] });
        const [query, setQuery] = useState("");
        const [view, setView] = useState({ page: "home", squadId: null });
        const [admin, setAdmin] = useState(false);
        const [toast, setToast] = useState(null);
        
        // ✅ NOVO ESTADO DE LOADING
        const [squadsLoaded, setSquadsLoaded] = useState(false);
        const [oncallsLoaded, setOnCallsLoaded] = useState(false);
        const isLoading = !squadsLoaded || !oncallsLoaded;

        // useEffect (Leitura do Firebase)
        useEffect(() => {
          const unsubscribeSquads = db
            .collection("squads")
            .onSnapshot((snapshot) => {
              const squadsData = snapshot.docs.map((doc) => ({
                id: doc.id,
                ...doc.data(),
              }));
              setSquads(squadsData);
              setData((prev) => ({ ...prev, squads: squadsData }));
              setSquadsLoaded(true); // ✅ ATIVA O FLAG
            });

          const unsubscribeOnCalls = db
            .collection("oncalls")
            .onSnapshot((snapshot) => {
              const oncallsData = snapshot.docs.map((doc) => ({
                id: doc.id,
                ...doc.data(),
              }));
              setOnCalls(oncallsData);
              setData((prev) => ({ ...prev, oncalls: oncallsData }));
              setOnCallsLoaded(true); // ✅ ATIVA O FLAG
            });

          return () => {
            unsubscribeSquads();
            unsubscribeOnCalls();
          };
        }, []);

        // useMemo: Filtro de Squads
        const filteredSquads = useMemo(() => {
          if (!query.trim()) return squads;
          const q = query.trim().toLowerCase();
          return squads.filter((s) => s.name.toLowerCase().includes(q));
        }, [query, squads]);
        
        // useMemo: Filtro de Pessoas (Busca Global)
        const filteredPeople = useMemo(() => {
          if (!query.trim()) return [];
          const q = query.trim().toLowerCase();
          return oncalls
            .filter((o) => o.personName.toLowerCase().includes(q))
            .map((o) => {
              const squadName = squads.find(s => s.id === o.squadId)?.name || 'Squad desconhecida';
              return { ...o, squadName };
            })
            .sort((a,b) => a.personName.localeCompare(b.personName));
        }, [query, oncalls, squads]);

        // useMemo: Squad Selecionada
        const selectedSquad = useMemo(
          () => squads.find((s) => s.id === view.squadId) || null,
          [view, squads]
        );

        // useMemo: Plantonistas da Squad (Ordenados)
        const selectedOnCalls = useMemo(
          () =>
            oncalls
              .filter((o) => o.squadId === view.squadId)
              .sort((a, b) => {
                const orderA = a.orderIndex || 99;
                const orderB = b.orderIndex || 99;
                if (orderA === orderB) {
                  return a.personName.localeCompare(b.personName);
                }
                return orderA - orderB;
              }),
          [oncalls, view]
        );
        
        // ==========================================
        // FUNÇÕES CRUD (COMPLETAS)
        // ==========================================
        
        async function addSquad(name) {
          const n = name?.trim();
          if (!n) return;
          await db.collection("squads").add({ name: n });
          setToast(`Squad "${n}" criada.`);
        }

        async function editSquad(id, name) {
          const n = name?.trim();
          if (!n) return;
          await db.collection("squads").doc(id).update({ name: n });
          setToast("Squad atualizada.");
        }

        async function deleteSquad(id) {
          if (
            !confirm("Remover esta squad e todos os plantonistas ligados a ela?")
          )
            return;

          await db.collection("squads").doc(id).delete();
          const oncallsSnapshot = await db
            .collection("oncalls")
            .where("squadId", "==", id)
            .get();
          const batch = db.batch();
          oncallsSnapshot.forEach((doc) => {
            batch.delete(doc.ref);
          });
          await batch.commit();

          if (view.squadId === id) setView({ page: "home", squadId: null });
          setToast("Squad removida.");
        }

        async function addOnCall(squadId, payload) {
          const item = {
            squadId,
            personName: payload.personName.trim(),
            phone: payload.phone.trim(),
            hours: payload.hours.trim(),
            isLead: payload.isLead || false,
            orderIndex: Number(payload.orderIndex) || 99,
          };
          await db.collection("oncalls").add(item);
          setToast("Plantonista adicionado.");
        }

        async function editOnCall(id, payload) {
          const dataToUpdate = {
            personName: payload.personName.trim(),
            phone: payload.phone.trim(),
            hours: payload.hours.trim(),
            isLead: payload.isLead || false,
            orderIndex: Number(payload.orderIndex) || 99,
          };
          await db.collection("oncalls").doc(id).update(dataToUpdate);
          setToast("Plantonista atualizado.");
        }

        async function deleteOnCall(id) {
          if (!confirm("Remover este plantonista?")) return;
          await db.collection("oncalls").doc(id).delete();
          setToast("Plantonista removido.");
        }
        
        // ==========================================
        // FUNÇÕES IMPORT/EXPORT (COMPLETAS)
        // ==========================================
        
        function exportJson() {
          const blob = new Blob([JSON.stringify(data, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `escalation-data-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        }

        async function importJson(file) {
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const data = JSON.parse(event.target.result);
              if (
                !data ||
                !Array.isArray(data.squads) ||
                !Array.isArray(data.oncalls)
              ) {
                alert("Arquivo JSON inválido. Verifique a estrutura.");
                return;
              }
              const batch = db.batch();
              data.squads.forEach((squad) => {
                const docRef = db.collection("squads").doc(squad.id || undefined);
                batch.set(docRef, { name: squad.name });
              });
              data.oncalls.forEach((oncall) => {
                const docRef = db.collection("oncalls").doc(oncall.id || undefined);
                batch.set(docRef, {
                  squadId: oncall.squadId,
                  personName: oncall.personName,
                  phone: oncall.phone,
                  hours: oncall.hours,
                  isLead: oncall.isLead || false,
                  orderIndex: oncall.orderIndex || 99,
                });
              });
              await batch.commit();
              setToast("Dados do JSON importados!");
            } catch (e) {
              console.error("Erro ao importar JSON:", e);
              alert("Não foi possível processar o arquivo JSON.");
            }
          };
          reader.readAsText(file);
        }
        
        async function importCsv(file) {
          const currentSquadId = view.squadId;
          if (!currentSquadId) {
            alert(
              "Por favor, abra uma squad antes de importar um CSV de plantonistas."
            );
            return;
          }
          const reader = new FileReader();
          reader.onload = async (event) => {
            try {
              const text = event.target.result;
              const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
              const [header, ...rows] = lines;
              const cols = header.split(",").map((c) => c.trim());
              const batch = db.batch();
              rows.forEach((row) => {
                const values = row.split(",");
                const oncallData = { squadId: currentSquadId };
                cols.forEach((col, index) => {
                  oncallData[col] = values[index]?.trim() || "";
                });
                const isLeadString = (oncallData.isLead || "false").toLowerCase();
                oncallData.isLead =
                  isLeadString === "true" ||
                  isLeadString === "1" ||
                  isLeadString === "sim";
                oncallData.orderIndex = Number(oncallData.orderIndex) || 99;
                if (oncallData.personName && oncallData.phone) {
                  const docRef = db.collection("oncalls").doc();
                  batch.set(docRef, oncallData);
                }
              });
              await batch.commit();
              setToast(`Plantonistas do CSV importados!`);
            } catch (e) {
              console.error("Erro ao importar CSV:", e);
              alert("Não foi possível processar o arquivo CSV.");
            }
          };
          reader.readAsText(file);
        }

        // ==========================================
        // RENDERIZAÇÃO DA APLICAÇÃO (JSX)
        // ==========================================
        return (
          <div className="min-h-screen bg-light text-secondary">
            <header className="sticky top-0 z-30 backdrop-blur bg-primary/80 border-b border-secondary/20 text-white">
              <div className="max-w-6xl mx-auto px-2 sm:px-4 py-3 flex items-center gap-2">
                <Logo />
                <h1 className="text-lg sm:text-2xl font-semibold">
                  Escalação
                </h1>
                <div className="ml-auto flex items-center gap-1 sm:gap-2">
                  <button
                    className={`px-3 py-1.5 rounded-lg text-sm border ${
                      admin
                        ? "bg-white/10 border-white/30"
                        : "bg-white text-primary"
                    }`}
                    onClick={() => setAdmin((v) => !v)}
                    title="Alterna modo administrador"
                  >
                    <span className="hidden sm:inline">Modo Admin: </span>
                    <span>{admin ? "ON" : "OFF"}</span>
                  </button>
                  <button
                    onClick={exportJson}
                    className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border border-white/30 bg-white/10 hover:bg-white/20"
                    title="Exportar dados em JSON"
                  >
                    <ICONS.ArrowDownTray className="w-4 h-4" />
                    <span className="hidden sm:inline">Exportar</span>
                  </button>
                  <label className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border border-white/30 bg-white/10 hover:bg-white/20 cursor-pointer">
                    <ICONS.ArrowUpTray className="w-4 h-4" />
                    <span className="hidden sm:inline">Importar</span>
                    <input
                      type="file"
                      accept=".json,.csv"
                      className="hidden"
                      onChange={(e) => {
                        const f = e.target.files?.[0];
                        if (f) {
                          if (f.name.endsWith(".json")) importJson(f);
                          else if (f.name.endsWith(".csv")) importCsv(f);
                        }
                        e.currentTarget.value = "";
                      }}
                    />
                  </label>
                </div>
              </div>
            </header>

            <main className="max-w-6xl mx-auto px-4 py-6">
              {view.page === "home" && (
                <HomeView
                  query={query}
                  setQuery={setQuery}
                  squads={filteredSquads} 
                  oncalls={oncalls} 
                  filteredPeople={filteredPeople}
                  isLoading={isLoading} // ✅ PASSA O ESTADO DE LOADING
                  onOpen={(id) => setView({ page: "detail", squadId: id })}
                  onCreateSquad={admin ? addSquad : undefined}
                  onEditSquad={admin ? editSquad : undefined}
                  onDeleteSquad={admin ? deleteSquad : undefined}
                />
              )}

              {view.page === "detail" && selectedSquad && (
                <DetailView
                  squad={selectedSquad}
                  onBack={() => setView({ page: "home", squadId: null })}
                  oncalls={selectedOnCalls}
                  isLoading={isLoading} // ✅ PASSA O ESTADO DE LOADING
                  onAdd={
                    admin
                      ? (payload) => addOnCall(selectedSquad.id, payload)
                      : undefined
                  }
                  onEdit={admin ? editOnCall : undefined}
                  onDelete={admin ? deleteOnCall : undefined}
                  setToast={setToast}
                />
              )}
              
              {view.page === "detail" && !selectedSquad && (
                <div className="text-center py-20">Squad não encontrada.</div>
              )}
            </main>

            <footer className="max-w-6xl mx-auto px-4 pb-10 text-xs text-subtle">
              <p>Desenvolvido por Gustavo Pereira</p>
            </footer>

            {toast && (
              <Toast
                key={toast}
                message={toast}
                type="success"
                onClose={() => setToast(null)}
              />
            )}
          </div>
        );
      }
      
      // ==========================================
      // ✅ NOVO: Componente Skeleton para Squad
      // ==========================================
      function SquadCardSkeleton() {
        return (
          <div className="group border rounded-2xl p-4 bg-white shadow-sm flex flex-col">
            <div className="flex-1">
              <div className="h-6 w-3/4 mb-2 bg-gray-200 rounded-md animate-pulse" />
              <div className="h-4 w-1/4 mb-3 bg-gray-200 rounded-md animate-pulse" />
              <div className="flex items-center gap-4">
                <div className="h-5 w-8 bg-gray-200 rounded-md animate-pulse" />
                <div className="h-5 w-8 bg-gray-200 rounded-md animate-pulse" />
              </div>
            </div>
            <div className="mt-4 pt-4 border-t flex items-center justify-between">
              <div className="flex gap-2">
                <div className="h-8 w-8 bg-gray-200 rounded-lg animate-pulse" />
                <div className="h-8 w-8 bg-gray-200 rounded-lg animate-pulse" />
              </div>
              <div className="h-9 w-24 bg-gray-200 rounded-lg animate-pulse" />
            </div>
          </div>
        );
      }

      // ==========================================
      // Componente: HomeView (✅ COM SKELETON)
      // ==========================================
      function HomeView({
        query,
        setQuery,
        squads,
        oncalls,
        filteredPeople,
        isLoading, // <-- RECEBE O ESTADO
        onOpen,
        onCreateSquad,
        onEditSquad,
        onDeleteSquad,
      }) {
        const [showNew, setShowNew] = useState(false);
        const [edit, setEdit] = useState(null);

        const squadCounts = useMemo(() => {
          const counts = {};
          for (const oncall of oncalls) {
            if (!counts[oncall.squadId]) {
              counts[oncall.squadId] = { primary: 0, leads: 0 };
            }
            if (oncall.isLead) {
              counts[oncall.squadId].leads += 1;
            } else {
              counts[oncall.squadId].primary += 1;
            }
          }
          return counts;
        }, [oncalls]);

        const hasQuery = query.trim().length > 0;
        const hasSquadResults = squads.length > 0;
        const hasPeopleResults = filteredPeople.length > 0;
        // ✅ ATUALIZADO: Só mostra "nenhuma squad" se NÃO estiver carregando
        const hasNoSquadsAtAll = !isLoading && oncalls.length === 0 && squads.length === 0;

        return (
          <div className="space-y-6">

      // ==========================================
      // Componentes: Modal, Toast, Logo (Com Animação)
      // ==========================================
      function Modal({ title, children, onClose }) {
        const [isMounted, setIsMounted] = useState(false);

        useEffect(() => {
          setIsMounted(true);
          const onKey = (e) => e.key === "Escape" && onClose();
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [onClose]);
        
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div
              className={`absolute inset-0 bg-black/30 transition-opacity duration-300 ease-out ${isMounted ? 'opacity-100' : 'opacity-0'}`}
              onClick={onClose}
              role="button"
              aria-label="Fechar"
            />
            <div className={`relative w-full max-w-lg bg-white rounded-3xl shadow-xl border p-5 transition-all duration-300 ease-out ${isMounted ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-lg font-semibold text-primary">{title}</h3>
                <button
                  onClick={onClose}
                  className="px-2 py-1 rounded-lg border text-sm bg-white hover:bg-accent/10"
                >
                  Fechar
                </button>
              </div>
              {children}
            </div>
          </div>
        );
      }

      function Toast({ message, type = "success", onClose }) {
        const [isMounted, setIsMounted] = useState(false);

        useEffect(() => {
          setIsMounted(true);
          const id = setTimeout(onClose, 2000);
          return () => clearTimeout(id);
        }, [onClose]);

        const isSuccess = type === "success";

        return (
          <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 ease-out ${isMounted ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
            <div className={`flex items-center gap-2 px-4 py-2 rounded-xl ${isSuccess ? 'bg-primary' : 'bg-red-600'} text-white text-sm shadow-lg`}>
              {isSuccess && <ICONS.CheckCircle className="w-5 h-5" />}
              {message}
            </div>
          </div>
        );
      }
      
      function Logo() {
        return (
          <div className="w-8 h-8 rounded-2xl bg-secondary text-white grid place-items-center text-sm font-bold">
            ES
          </div>
        );
      }
      
      // ==========================================
      // Funções Helpers (Formatação)
      // ==========================================
      
      function formatPhoneTyping(v) {
        const nums = v.replace(/\D/g, "").slice(0, 11);
        if (nums.length <= 2) return `(${nums}`;
        if (nums.length <= 6) return `(${nums.slice(0, 2)}) ${nums.slice(2)}`;
        if (nums.length <= 10)
          return `(${nums.slice(0, 2)}) ${nums.slice(2, 6)}-${nums.slice(6)}`;
        return `(${nums.slice(0, 2)}) ${nums.slice(2, 7)}-${nums.slice(7)}`;
      }

      function formatPhone(v) {
        const x = formatPhoneTyping(v);
        return x?.trim() || "";
      }

      // ==========================================
      // Monta o app
      // ==========================================
      const root = ReactDOM.createRoot(document.getElementById("app"));
      root.render(<EscalationApp />);
    </script>
  </body>
</html>
